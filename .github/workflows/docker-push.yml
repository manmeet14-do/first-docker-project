name: Docker Push Pipeline


on:
 workflow_dispatch:


jobs:
  build:
   runs-on: ubuntu-latest

   steps:
     - name: Download repository code
       uses: actions/checkout@v4

     - name: Verify Files 
       run: ls -la

     - name: Create Docker image from Dockerfile
       run: docker build -t my-python-app .

     - name: Verify Image created
       run: docker images
 
     - name: login to Docker
       uses: docker/login-action@v4
       with:
         username: ${{ vars.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_TOKEN }}

     - name: Tag docker hub
       run: docker tag my-python-app ${{ vars.DOCKER_USERNAME }}/my-python-app:v1

     - name: Push docker image
       run: docker push ${{ vars.DOCKER_USERNAME }}/my-python-app:v1


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
     - name: deploy to Ec2
       uses: appleboy/ssh-action@v1.2.2
       with:
         host: ${{ secrets.HOST }}
         username: ${{ secrets.USERNAME }}
         password: ${{ secrets.PASSWORD }}
         port: 22
         script: | 
            docker login -u ${{ vars.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_TOKEN }}

            docker pull ${{ vars.DOCKER_USERNAME }}/my-python-app:v1

            docker stop my-python-app || true

            docker rm my-python-app || true

            docker run -d --name my-python-app -p 5000:5000 ${{ vars.DOCKER_USERNAME }}/my-python-app:v1
    


 
