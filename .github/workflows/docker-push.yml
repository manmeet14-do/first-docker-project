name: Docker Push Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Files
        run: ls -la

      - name: Build Docker Image
        run: docker build -t my-python-app .

      - name: Verify Docker Image
        run: docker images

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Docker Image
        run: docker tag my-python-app manmeeetkaur/my-python-app:latest

      - name: Push Docker Image
        run: docker push manmeeetkaur/my-python-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "${{ secrets.DOCKER_TOKEN }}" | sudo docker login -u "${{ vars.DOCKER_USERNAME }}" --password-stdin
            sudo docker pull manmeeetkaur/my-python-app:latest
            sudo docker stop my-python-app || true
            sudo docker rm my-python-app || true
            sudo docker run -d --name my-python-app -p 5000:5000 manmeeetkaur/my-python-app:latest
