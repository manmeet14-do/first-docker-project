name: Docker Push Pipeline


on:
 workflow_dispatch:


jobs:
  build:
   runs-on: ubuntu-latest

   steps:
     - name: Download repository code
       uses: actions/checkout@v4

     - name: Verify Files 
       run: ls -la

     - name: Create Docker image from Dockerfile
       run: docker build -t my-python-app .

     - name: Verify Image created
       run: docker images
 
     - name: login to Docker
       uses: docker/login-action@v4
       with:
         username: ${{ vars.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_TOKEN }}

     - name: Tag docker hub
       run: docker tag my-app manmeeetkaur/my-python-app:v1

     - name: Push docker image
       run : docker push manmeeetkaur/my-python-app:v1
   
    


 
